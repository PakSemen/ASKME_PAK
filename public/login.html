<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link rel="stylesheet" href="../static/css/bootstrap.min.css">
  </head>

  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">AskPupkin</a>
        
          <form class="d-flex" role="search">
            <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
            <button class="btn btn-outline-success" type="submit">Ask </button>
          </form>

        <div class="d-flex gap-1">
          <img src="kkk.jpg" alt="Avatar" class="img-thumbnail">
          <div>
            <div>
              Dr. Pepper
            </div> 
            <a href="#">Settings</a>
            <a href="#">log out</a>
          </div>
        </div>
      </div>
    </nav>

    <main class="container mt-3">
      <div class="d-flex gap-3 align-items-center mb-4">
          <h1>Log In</h1>
      </div>

      <div class="row mb-5">
        <div class="col-9">
          <div class="d-flex flex-column gap-3">
            <p class="fs-6" style="color: red;">Sorry, wrong password</p>

            <div class="login">
              <div class="row">
                <div class="col-2">
                <p class="fs-6"> Login </p>      
                </div>

                <div class="col-10">
                  <input type="text" class="form-control" id="login" style="width: 40%;">
                </div>
              </div>
            </div>  

            <div class="password">
              <div class="row">
                <div class="col-2">
                <p class="fs-6"> Password </p>      
                </div>

                <div class="col-10">
                  <input type="password" class="form-control" id="password" style="width: 40%;">
                </div>
              </div>
            </div>
            
            <div class="button">
              <div class="offset-md-2">
                  <button type="submit" class="btn btn-success">Log In!</button>
              </div>
            </div>

            <a class="createAccount offset-md-2" href="#"> create new account </a>
          </div>    
        </div> 
        
        <div class="col">
            <section class="mb-3">
                <h2> Popular Tags </h2>
                    <div>
                        <span class="badge badge-pill bg-primary">Main</span>
                        <span class="badge badge-pill bg-secondary">Secondary</span>
                        <span class="badge badge-pill bg-success">Technopark</span>
                        <span class="badge badge-pill bg-danger">Puppies</span>
                        <span class="badge badge-pill bg-warning">Simple</span>
                        <span class="badge badge-pill bg-info">Dimple</span>
                        <span class="badge badge-pill bg-dark">BTMSU</span>
                    </div>
            </section>
            <section>
                <h2>Best Members</h2>
                    <div>
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item"><a href="#">Member</a></li>
                            <li class="list-group-item"><a href="#">Member</a></li>
                            <li class="list-group-item"><a href="#">Member</a></li>
                            <li class="list-group-item"><a href="#">Member</a></li>
                            <li class="list-group-item"><a href="#">Member</a></li>
                            <li class="list-group-item"><a href="#">Member</a></li>
                            <li class="list-group-item"><a href="#">Member</a></li>
                          </ul>
                    </div>
            </section>
        </div> 

      </div> 
    </main>
    <script src="../static/js/bootstrap.min.js"></script>

</html>
