{% extends 'layouts/base.html' %}
{% load static %}

{% block content %}

        <div class="d-flex gap-3 align-items-center mb-4">
          <h1>Log In</h1>
        </div>
        <div class="col-9">
          <div class="d-flex flex-column gap-3">
            <p class="fs-6" style="color: red;">Sorry, wrong password</p>

            <div class="login">
              <div class="row">
                <div class="col-2">
                <p class="fs-6"> Login </p>      
                </div>

                <div class="col-10">
                  <input type="text" class="form-control" id="login" style="width: 40%;">
                </div>
              </div>
            </div>  

            <div class="password">
              <div class="row">
                <div class="col-2">
                <p class="fs-6"> Password </p>      
                </div>

                <div class="col-10">
                  <input type="password" class="form-control" id="password" style="width: 40%;">
                </div>
              </div>
            </div>
            
            <div class="button">
              <div class="offset-md-2">
                  <button type="submit" class="btn btn-success">Log In!</button>
              </div>
            </div>

            <a class="createAccount offset-md-2" href="#"> create new account </a>
          </div>    
        </div> 

{% endblock %}
